spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/modernize_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

# Schedule inherits the default from application.yml (nightly 2am).
# To test scheduling locally, change application.yml schedule to:
#   schedule: "0 * * * * ?"   (every minute)
# To disable the scheduler in dev, add:
#   batch-pipeline:
#     schedule: "-"
