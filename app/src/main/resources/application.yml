spring:
  profiles:
    active: sandbox

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

batch-pipeline:
  files:
    - ach_20250310.csv
    - ach_20250317.csv
    - ach_20250324.csv
  # Cron schedule for BatchScheduler. Uses Spring cron format:
  #   second  minute  hour  day-of-month  month  day-of-week
  # Default: nightly at 2:00 AM. Each profile can override this.
  # Set to "-" to disable the scheduler entirely.
  schedule: "0 0 2 * * ?"
