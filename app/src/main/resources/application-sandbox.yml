spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/modernize_buildtest
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  main:
    web-application-type: none

# Sandbox runs via CommandLineRunner (BatchRunner), not the scheduler.
# BatchScheduler is excluded by @Profile("!sandbox") so this value
# is never actually read, but it is set here for clarity.
batch-pipeline:
  schedule: "-"
